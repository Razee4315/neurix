name: Release

# Triggers on every push to main and on manual dispatch.
# Builds: Windows (.msi + .exe) and Android (APK + AAB)
#
# ─── ONE-TIME SETUP REQUIRED ──────────────────────────────────────────────────
# 1. Repo settings → Actions → General → Workflow permissions → Read and write
# 2. Add GitHub Secrets (Settings → Secrets and variables → Actions):
#      ANDROID_KEYSTORE_BASE64   base64-encoded .keystore file
#      ANDROID_KEY_ALIAS         key alias
#      ANDROID_KEY_PASSWORD      key password
#      ANDROID_STORE_PASSWORD    keystore store password
# 3. Run locally once: npm run android:init
#    Then commit the generated src-tauri/gen/android/ folder.
#    Android CI job is skipped gracefully until that folder exists.
# ─────────────────────────────────────────────────────────────────────────────

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  # ─── Job 1: Auto-bump patch version ────────────────────────────────────────
  check-and-bump:
    name: Version check and bump
    runs-on: ubuntu-latest
    outputs:
      should_release: ${{ steps.bump.outputs.should_release }}
      version: ${{ steps.bump.outputs.version }}

    steps:
      - name: Checkout repository (full history)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check for changes and bump version
        id: bump
        run: |
          CURRENT_VERSION=$(jq -r '.version' src-tauri/tauri.conf.json)
          echo "Current version: $CURRENT_VERSION"

          if git tag -l "v$CURRENT_VERSION" | grep -q "v$CURRENT_VERSION"; then
            echo "Tag v$CURRENT_VERSION exists"
            COMMITS_SINCE=$(git rev-list "v$CURRENT_VERSION"..HEAD --count 2>/dev/null || echo "0")
            echo "Commits since tag: $COMMITS_SINCE"

            if [ "$COMMITS_SINCE" -eq "0" ]; then
              echo "Nothing new — skipping release"
              echo "should_release=false" >> $GITHUB_OUTPUT
              echo "version=$CURRENT_VERSION" >> $GITHUB_OUTPUT
              exit 0
            fi

            IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT_VERSION"
            NEW_VERSION="$MAJOR.$MINOR.$((PATCH + 1))"
            echo "Bumping: $CURRENT_VERSION → $NEW_VERSION"

            jq --arg v "$NEW_VERSION" '.version = $v' src-tauri/tauri.conf.json > tmp.json && mv tmp.json src-tauri/tauri.conf.json
            jq --arg v "$NEW_VERSION" '.version = $v' package.json > tmp.json && mv tmp.json package.json
            sed -i "s/^version = \"$CURRENT_VERSION\"/version = \"$NEW_VERSION\"/" src-tauri/Cargo.toml

            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add src-tauri/tauri.conf.json package.json src-tauri/Cargo.toml
            git commit -m "chore: bump version to $NEW_VERSION [skip ci]"
            git push

            echo "should_release=true" >> $GITHUB_OUTPUT
            echo "version=$NEW_VERSION" >> $GITHUB_OUTPUT
          else
            echo "No tag for v$CURRENT_VERSION — first release"
            echo "should_release=true" >> $GITHUB_OUTPUT
            echo "version=$CURRENT_VERSION" >> $GITHUB_OUTPUT
          fi

  # ─── Job 2: Windows build ──────────────────────────────────────────────────
  release-windows:
    name: Release Windows
    needs: check-and-bump
    if: needs.check-and-bump.outputs.should_release == 'true'
    runs-on: windows-latest

    steps:
      - name: Checkout repository (post-bump)
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build artifacts
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install frontend dependencies
        run: npm ci

      - name: Build and publish Windows release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tauriScript: npx tauri
          tagName: v__VERSION__
          releaseName: Neurix v__VERSION__
          releaseBody: |
            ## Neurix v__VERSION__

            Your AI. Your phone. No cloud. No subscription. No limits.

            Run powerful 1B language models directly on your device — fully offline, completely private.

            ### Downloads

            | Platform | File | Notes |
            |----------|------|-------|
            | Windows | `.msi` | Recommended installer |
            | Windows | `.exe` | NSIS installer |
            | Android | `.apk` | Sideload (enable unknown sources) |
            | Android | `.aab` | Play Store upload |

            ### Android Sideload
            1. Enable **Install unknown apps** in Android settings
            2. Download `.apk` and tap to install
            3. Download a model inside the app — works fully offline after that
          releaseDraft: false
          prerelease: false

  # ─── Job 3: Android build ──────────────────────────────────────────────────
  release-android:
    name: Release Android (APK + AAB)
    needs: check-and-bump
    if: needs.check-and-bump.outputs.should_release == 'true'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository (post-bump)
        uses: actions/checkout@v4
        with:
          ref: main

      # Skip Android build gracefully if android:init hasn't been run yet
      - name: Check Android project is initialized
        id: android-check
        run: |
          if [ -d "src-tauri/gen/android" ]; then
            echo "ready=true" >> $GITHUB_OUTPUT
            echo "Android project found — proceeding with build"
          else
            echo "ready=false" >> $GITHUB_OUTPUT
            echo "src-tauri/gen/android not found."
            echo "Run: npm run android:init — then commit the generated folder."
          fi

      - name: Setup Java 17
        if: steps.android-check.outputs.ready == 'true'
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        if: steps.android-check.outputs.ready == 'true'
        uses: android-actions/setup-android@v3

      - name: Install Android NDK 28
        if: steps.android-check.outputs.ready == 'true'
        run: sdkmanager "ndk;28.0.13004108"

      - name: Install Rust (stable)
        if: steps.android-check.outputs.ready == 'true'
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build artifacts
        if: steps.android-check.outputs.ready == 'true'
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Add Rust Android targets
        if: steps.android-check.outputs.ready == 'true'
        run: |
          rustup target add aarch64-linux-android
          rustup target add armv7-linux-androideabi
          rustup target add i686-linux-android
          rustup target add x86_64-linux-android

      - name: Setup Node.js
        if: steps.android-check.outputs.ready == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install frontend dependencies
        if: steps.android-check.outputs.ready == 'true'
        run: npm ci

      # Decode keystore if secret is set — otherwise builds a debug APK
      - name: Setup Android signing keystore
        if: steps.android-check.outputs.ready == 'true'
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          mkdir -p src-tauri/gen/android
          if [ -n "$ANDROID_KEYSTORE_BASE64" ]; then
            echo "$ANDROID_KEYSTORE_BASE64" | base64 --decode > src-tauri/gen/android/neurix-release.keystore
            echo "Keystore decoded successfully"
          else
            echo "No keystore secret set — will produce unsigned/debug build"
          fi

      - name: Write keystore.properties
        if: steps.android-check.outputs.ready == 'true'
        env:
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
          ANDROID_STORE_PASSWORD: ${{ secrets.ANDROID_STORE_PASSWORD }}
        run: |
          if [ -f "src-tauri/gen/android/neurix-release.keystore" ]; then
            cat > src-tauri/gen/android/keystore.properties << EOF
          storeFile=neurix-release.keystore
          storePassword=$ANDROID_STORE_PASSWORD
          keyAlias=$ANDROID_KEY_ALIAS
          keyPassword=$ANDROID_KEY_PASSWORD
          EOF
            echo "keystore.properties written"
          else
            echo "Skipping keystore.properties — no keystore available"
          fi

      - name: Set NDK_HOME
        if: steps.android-check.outputs.ready == 'true'
        run: |
          NDK_DIR=$(ls -d $ANDROID_HOME/ndk/*/ 2>/dev/null | head -1 | sed 's:/$::')
          echo "NDK_HOME=$NDK_DIR" >> $GITHUB_ENV
          echo "Using NDK at: $NDK_DIR"

      - name: Build Android APK + AAB (ARM64)
        if: steps.android-check.outputs.ready == 'true'
        env:
          ANDROID_HOME: ${{ env.ANDROID_HOME }}
          NDK_HOME: ${{ env.NDK_HOME }}
        run: npx tauri android build -- --target aarch64

      - name: Rename and upload Android artifacts
        if: steps.android-check.outputs.ready == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION=${{ needs.check-and-bump.outputs.version }}

          # Find the APK and AAB (debug or release depending on signing)
          APK=$(find src-tauri/gen/android -name "*.apk" -type f | head -1)
          AAB=$(find src-tauri/gen/android -name "*.aab" -type f | head -1)

          # Wait for Windows job to create the release (max 5 min)
          for i in $(seq 1 30); do
            if gh release view "v$VERSION" &>/dev/null; then
              echo "Release v$VERSION found"
              break
            fi
            echo "Waiting for release... ($i/30)"
            sleep 10
          done

          if [ -n "$APK" ]; then
            cp "$APK" "Neurix_${VERSION}_android.apk"
            gh release upload "v$VERSION" "Neurix_${VERSION}_android.apk" --clobber
          fi

          if [ -n "$AAB" ]; then
            cp "$AAB" "Neurix_${VERSION}.aab"
            gh release upload "v$VERSION" "Neurix_${VERSION}.aab" --clobber
          fi
